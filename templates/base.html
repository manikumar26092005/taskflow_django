{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TaskFlow{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  {% if user.is_authenticated %}
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{% url 'task_list' %}">
        <span class="brand-mark">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8.5L6.2 11.7L13 4" stroke="#16352A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-name">TaskFlow</span>
      </a>
      <nav class="nav-links">
        <a href="{% url 'task_list' %}" class="{% if request.resolver_match.url_name == 'task_list' %}active{% endif %}">My Tasks</a>
        <a href="{% url 'category_list' %}" class="{% if request.resolver_match.url_name == 'category_list' %}active{% endif %}">Categories</a>
      </nav>
      <div class="nav-user">
        <span class="nav-username">{{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="margin:0;">
          {% csrf_token %}
          <button type="submit" class="btn-logout">Logout</button>
        </form>
      </div>
    </div>
  </header>
  {% endif %}

  <main class="{% block main_class %}page{% endblock %}">
    {% if messages %}
      {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
          <span>{{ message }}</span>
          <button type="button" class="alert-close" onclick="this.parentElement.style.display='none'">&times;</button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
