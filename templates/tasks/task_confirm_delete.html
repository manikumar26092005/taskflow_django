{% extends "base.html" %}
{% block title %}Delete Task - TaskFlow{% endblock %}
{% block main_class %}page auth-page{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Delete Task 🗑️</h1>
    <p style="color: var(--ink-soft); margin-bottom: 26px;">
      Are you sure you want to delete <strong>“{{ task.title }}”</strong>? This can't be undone.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="form-actions">
        <button type="submit" class="btn btn-delete btn-full">Delete Task</button>
        <a href="{% url 'task_list' %}" class="btn btn-outline btn-full">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
